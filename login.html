<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>nini's Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body {
  padding-bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1.5rem;
}
</style>
</head>
<body>
<div class="login-wrap page-in">

  <div class="login-logo">
    <div class="login-logo-icon">
      <svg viewBox="0 0 24 24"><polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="8.5" x2="22" y2="8.5"/><line x1="2" y1="15.5" x2="22" y2="15.5"/></svg>
    </div>
    <div style="display:flex;align-items:baseline;gap:4px">
      <span class="brand-nini">nini's&nbsp;</span>
      <span class="brand-word" style="font-size:1.5rem">Studio</span>
    </div>
    <p class="text-faint" style="font-size:13px;margin-top:4px">Laser Pricing &amp; Product Manager</p>
  </div>

  <div class="login-card">
    <label class="field-label" for="pw-input" style="font-size:13px;margin-bottom:8px;display:block">Password</label>
    <div class="pw-field" id="pw-field">
      <input type="password" id="pw-input" placeholder="Enter password" autocomplete="current-password" onkeydown="onKey(event)">
      <button class="pw-toggle-btn" onclick="toggleVis()" tabindex="-1" aria-label="Show/hide password">
        <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button class="login-submit" id="login-btn" onclick="doLogin()">
      <svg class="btn-icon" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <div class="spinner spinner--sm" style="display:none;border-top-color:white;border-color:rgba(255,255,255,.3)" id="login-spin"></div>
      Enter Studio
    </button>
    <div class="login-err" id="login-err">Incorrect password — please try again.</div>
  </div>

  <div class="login-footer">🔒 SHA-256 protected · Internal use only</div>
</div>

<script>
const PASSWORD_HASH = '7cf65358a08ef65f79098bd16bd212119c387ae6db1232af2400e3d0588f94a0';
const SESSION_KEY   = 'ninis_studio_auth';
const SESSION_VALUE = 'granted_' + PASSWORD_HASH.slice(0,8);

if(sessionStorage.getItem(SESSION_KEY) === SESSION_VALUE) window.location.replace('products.html');

async function sha256(msg){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function doLogin(){
  const pw = document.getElementById('pw-input').value;
  if(!pw){ shake(); return; }
  const btn  = document.getElementById('login-btn');
  const spin = document.getElementById('login-spin');
  const icon = btn.querySelector('.btn-icon');
  btn.classList.add('loading');
  icon.style.display = 'none';
  spin.style.display = 'block';
  document.getElementById('login-err').classList.remove('show');
  await new Promise(r=>setTimeout(r,350));
  const hash = await sha256(pw);
  if(hash === PASSWORD_HASH){
    sessionStorage.setItem(SESSION_KEY, SESSION_VALUE);
    window.location.replace('products.html');
  } else {
    btn.classList.remove('loading');
    icon.style.display = ''; spin.style.display = 'none';
    document.getElementById('pw-field').classList.add('err');
    document.getElementById('login-err').classList.add('show');
    shake();
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    setTimeout(()=>document.getElementById('pw-field').classList.remove('err'),1500);
  }
}
function onKey(e){ if(e.key==='Enter') doLogin(); }
function shake(){
  const c = document.querySelector('.login-card');
  c.classList.remove('shake'); void c.offsetWidth; c.classList.add('shake');
}
let vis = false;
function toggleVis(){
  vis = !vis;
  document.getElementById('pw-input').type = vis ? 'text' : 'password';
  document.getElementById('eye-icon').innerHTML = vis
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}
document.getElementById('pw-input').focus();
</script>
</body>
</html>
