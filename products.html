<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>nini's Products</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,600&family=DM+Sans:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F6F0;--surface:#fff;--surface2:#F4F1EB;
  --border:#E3DDD2;--border2:#C8C1B4;
  --text:#252018;--muted:#6E6759;--faint:#A8A19A;
  --accent:#A0722A;--accent-light:#F5EAD6;--accent-mid:#C08B3A;
  --danger:#9B2335;--danger-light:#FBECEE;--danger-border:#E8A0A8;
  --ok-bg:#FFFBE8;--ok-border:#EDD97A;--ok-text:#7A6610;
  --good-bg:#E8F4ED;--good-border:#74C69A;--good-text:#1E6641;
  --great-bg:#E6F1FB;--great-border:#85B7EB;--great-text:#185FA5;
  --r:12px;--r-sm:7px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.65;min-height:100vh}

/* ── Loading overlay ── */
.db-loading{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:opacity .3s}
.db-loading.hidden{opacity:0;pointer-events:none}
.db-loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.db-loading p{font-size:13px;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Header ── */
.page-header{background:var(--surface);border-bottom:1px solid var(--border);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:baseline;gap:3px}
.brand-nini{font-family:'Caveat',cursive;font-size:2rem;font-weight:600;color:var(--accent);line-height:1}
.brand-products{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--text);line-height:1}
.header-sub{font-size:12px;color:var(--faint);margin-top:2px}
.main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.5rem}
.toolbar-left{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.toolbar-title{font-size:13px;color:var(--muted)}
.toolbar-title span{font-weight:500;color:var(--text)}
.sort-group{display:flex;align-items:center;gap:6px}
.sort-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);font-weight:500;white-space:nowrap}
.sort-btn{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 10px;border-radius:var(--r-sm);font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:background .12s,border-color .12s,color .12s;white-space:nowrap}
.sort-btn:hover{background:var(--surface2);color:var(--text)}
.sort-btn.active{background:var(--accent-light);border-color:var(--accent-mid);color:var(--accent)}
.sort-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}
.sort-btn.asc svg.arrow{transform:rotate(0deg)}.sort-btn.desc svg.arrow{transform:rotate(180deg)}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:1.25rem}
.card-new{border:2px dashed var(--border2);border-radius:var(--r);padding:2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;cursor:pointer;transition:border-color .15s,background .15s;min-height:200px;color:var(--faint);font-size:13px;text-align:center}
.card-new:hover{border-color:var(--accent-mid);background:var(--accent-light);color:var(--accent)}
.card-new .plus{width:44px;height:44px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:24px;line-height:1;transition:background .15s,color .15s}
.card-new:hover .plus{background:var(--accent-light);color:var(--accent)}

/* ── Product card ── */
.p-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;transition:border-color .15s,transform .15s;animation:fadeIn .3s ease both;position:relative;overflow:hidden}
.p-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.p-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity .2s;z-index:1}
.p-card:hover::before{opacity:1}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.p-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;border-bottom:1px solid var(--border)}
.p-no-img{width:100%;aspect-ratio:4/3;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--faint);font-size:11px}
.p-no-img svg{width:28px;height:28px;stroke:var(--border2);fill:none;stroke-width:1.5;stroke-linecap:round}

.p-body{padding:1rem 1.1rem 1.1rem;display:flex;flex-direction:column;flex:1}
.p-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:.2rem;color:var(--text);line-height:1.25}
.p-mat{font-size:11px;color:var(--faint);margin-bottom:.6rem;display:flex;align-items:center;gap:4px}
.p-mat svg{width:11px;height:11px;stroke:var(--faint);fill:none;stroke-width:2}
.p-cost{font-size:11px;color:var(--faint);margin-bottom:.6rem}
.p-cost strong{color:var(--muted);font-weight:500}
.p-prices{margin-bottom:.85rem;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
.p-price-row{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;font-size:12px}
.p-price-row:not(:last-child){border-bottom:1px solid var(--border)}
.p-price-row:first-child{background:var(--surface2)}
.p-chan{color:var(--muted)}
.p-val{font-weight:500;color:var(--text)}
.p-override{font-size:11px;color:var(--accent);font-weight:500}
.p-vat{font-size:10px;color:var(--faint);margin-left:3px}
.p-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:.65rem;border-top:1px solid var(--border)}
.margin-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.mp-danger{background:var(--danger-light);color:var(--danger)}
.mp-caution{background:var(--ok-bg);color:var(--ok-text)}
.mp-good{background:var(--good-bg);color:var(--good-text)}
.mp-great{background:var(--great-bg);color:var(--great-text)}
.p-actions{display:flex;gap:6px}
.act-btn{width:30px;height:30px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,border-color .12s,color .12s}
.act-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.act-btn.edit:hover{background:var(--accent-light);border-color:var(--accent-mid);color:var(--accent)}
.act-btn.del:hover{background:var(--danger-light);border-color:var(--danger-border);color:var(--danger)}
.margin-rank{position:absolute;top:10px;left:10px;z-index:2;font-size:10px;font-weight:500;color:white;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);border-radius:20px;padding:2px 8px;opacity:0;transition:opacity .2s}
.sorting-active .margin-rank{opacity:1}

.btn{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 16px;border-radius:var(--r-sm);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:background .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:white}
.btn-accent:hover{background:var(--accent-mid);border-color:var(--accent-mid)}
.btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

@media(max-width:500px){.page-header{padding:1rem;flex-direction:column;align-items:flex-start;gap:.5rem}.main{padding:1.25rem 1rem 4rem}}
</style>
</head>
<body>

<div class="db-loading" id="db-loading">
  <div class="spinner"></div>
  <p>Loading products…</p>
</div>

<div class="page-header">
  <div>
    <div class="brand"><span class="brand-nini">nini's&nbsp;</span><span class="brand-products">Products</span></div>
    <div class="header-sub">Your laser-cut &amp; engraved collection</div>
  </div>
  <button class="btn btn-accent" onclick="newProduct()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New product
  </button>
</div>

<div class="main">
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="toolbar-title">Showing <span id="count-label">…</span></div>
      <div class="sort-group">
        <span class="sort-label">Sort by</span>
        <button class="sort-btn active" id="sort-name-btn" onclick="setSort('name')">
          Name <svg class="arrow" viewBox="0 0 10 10"><polyline points="2,3 5,7 8,3"/></svg>
        </button>
        <button class="sort-btn" id="sort-margin-btn" onclick="setSort('margin')">
          Margin <svg class="arrow" viewBox="0 0 10 10"><polyline points="2,3 5,7 8,3"/></svg>
        </button>
        <button class="sort-btn" id="sort-date-btn" onclick="setSort('date')">
          Newest <svg class="arrow" viewBox="0 0 10 10"><polyline points="2,3 5,7 8,3"/></svg>
        </button>
      </div>
    </div>
    <div style="font-size:12px;color:var(--faint)">Prices include 20% VAT where applicable</div>
  </div>
  <div class="grid" id="product-grid"></div>
</div>

<script>
// ─── Auth guard ───────────────────────────────────────────────────────────────
(function(){
  const SK='ninis_studio_auth',HP='7cf65358';
  if(sessionStorage.getItem(SK)!=='granted_'+HP) window.location.replace('login.html');
})();

// ─── Supabase ─────────────────────────────────────────────────────────────────
const SUPA_URL='https://dxvzjgzqxltphakyrzmn.supabase.co';
const SUPA_KEY='sb_publishable_MqkXWynuaIialGbCFD7_hw_cEgsenMz';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);
const STUDIO='new.html';

let sortKey='name',sortDir='asc',isSortingByMargin=false;
let allProducts=[];

function marginMeta(m){
  if(m<44)return{cls:'mp-danger',label:'High risk'};
  if(m<50)return{cls:'mp-caution',label:'Caution'};
  if(m<67)return{cls:'mp-good',label:'Good'};
  return{cls:'mp-great',label:'Premium'};
}
function fmt(n){return n!=null?'€\u202f'+Number(n).toFixed(2):'—';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setSort(key){
  if(sortKey===key)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortKey=key;sortDir=key==='margin'?'desc':'asc';}
  isSortingByMargin=(key==='margin');
  updateSortBtns();render(allProducts);
}
function updateSortBtns(){
  ['name','margin','date'].forEach(k=>{
    const btn=document.getElementById('sort-'+k+'-btn');
    btn.classList.toggle('active',sortKey===k);
    btn.classList.toggle('asc',sortKey===k&&sortDir==='asc');
    btn.classList.toggle('desc',sortKey===k&&sortDir==='desc');
  });
}
function sorted(products){
  return [...products].sort((a,b)=>{
    const ad=a.data||{},bd=b.data||{};
    let cmp=0;
    if(sortKey==='name')cmp=(a.name||'').localeCompare(b.name||'');
    else if(sortKey==='margin')cmp=(ad.displayMargin||0)-(bd.displayMargin||0);
    else if(sortKey==='date')cmp=(ad.savedAt||0)-(bd.savedAt||0);
    return sortDir==='asc'?cmp:-cmp;
  });
}

function render(products){
  allProducts=products;
  const list=sorted(products);
  const grid=document.getElementById('product-grid');
  document.getElementById('count-label').textContent=products.length+' product'+(products.length!==1?'s':'');
  grid.className='grid'+(isSortingByMargin?' sorting-active':'');
  grid.innerHTML='';

  const ghost=document.createElement('div');
  ghost.className='card-new';ghost.onclick=newProduct;

  if(!products.length){
    ghost.style.gridColumn='1/-1';ghost.style.minHeight='260px';
    ghost.innerHTML=`<div class="plus">+</div><div><strong style="font-weight:500;font-size:14px;color:inherit">Add your first product</strong><br><span style="font-size:12px">Open the pricing studio to get started</span></div>`;
    grid.appendChild(ghost);return;
  }
  grid.appendChild(ghost);
  ghost.innerHTML='<div class="plus">+</div><span>New product</span>';

  list.forEach((row,rank)=>{
    const p=row.data||{};
    const m=p.displayMargin??0;
    const mm=marginMeta(m);
    const hasImg=!!p.image;
    const fairOv=p.fairFinalOverride&&p.fairFinalOverride!==p.fairSugg;
    const etsyOv=p.etsyFinalOverride&&p.etsyFinalOverride!==p.etsySugg;
    const webOv=p.webFinalOverride&&p.webFinalOverride!==p.webSugg;
    function pc(val,ov){return ov?`<span class="p-override">${fmt(val)}</span>`:fmt(val);}
    const card=document.createElement('div');
    card.className='p-card';card.style.animationDelay=(rank*0.04)+'s';
    card.innerHTML=`
      <div class="margin-rank">#${rank+1} by margin</div>
      ${hasImg
        ?`<img class="p-img" src="${p.image}" alt="${esc(row.name||'')}" loading="lazy">`
        :`<div class="p-no-img"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>No photo yet</span></div>`
      }
      <div class="p-body">
        <div class="p-name">${esc(row.name||'Untitled')}</div>
        <div class="p-mat"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>${esc(p.matName||'—')}</div>
        <div class="p-cost">Cost per piece: <strong>${fmt(p.totalCost)}</strong></div>
        <div class="p-prices">
          <div class="p-price-row"><span class="p-chan">Craft fair</span><span class="p-val">${pc(p.fairPrice,fairOv)}<span class="p-vat">incl. VAT</span></span></div>
          <div class="p-price-row"><span class="p-chan">Etsy</span><span class="p-val">${pc(p.etsyPrice,etsyOv)}<span class="p-vat">incl. VAT</span></span></div>
          <div class="p-price-row"><span class="p-chan">Webshop</span><span class="p-val">${pc(p.webPrice,webOv)}<span class="p-vat">incl. VAT</span></span></div>
        </div>
        <div class="p-footer">
          <span class="margin-pill ${mm.cls}">${Math.round(m)}% — ${mm.label}</span>
          <div class="p-actions">
            <button class="act-btn edit" onclick="editProduct(${row.id})" title="Edit">
              <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="act-btn del" onclick="deleteProduct(${row.id})" title="Delete">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function newProduct(){try{localStorage.setItem('lps_edit_id','new');}catch(e){}window.location.href=STUDIO;}
function editProduct(id){try{localStorage.setItem('lps_edit_id',String(id));}catch(e){}window.location.href=STUDIO;}
async function deleteProduct(id){
  if(!confirm('Remove this product?'))return;
  await db.from('products').delete().eq('id',id);
  allProducts=allProducts.filter(p=>p.id!==id);
  render(allProducts);
}

async function init(){
  const overlay=document.getElementById('db-loading');
  try{
    const {data,error}=await db.from('products').select('id,name,data,updated_at').order('updated_at',{ascending:false});
    if(error)throw error;
    render(data||[]);
  } catch(e){
    document.getElementById('count-label').textContent='Could not load — check your connection';
  } finally {
    overlay.classList.add('hidden');
    setTimeout(()=>overlay.style.display='none',400);
  }
}

updateSortBtns();
init();
</script>
</body>
</html>
