<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>nini's Products</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=DM+Sans:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>
<div class="db-overlay" id="overlay"><div class="spinner"></div><p>Loading products…</p></div>
<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"><span id="toast-txt"></span><button class="toast__close" onclick="closeToast()" aria-label="Dismiss"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>

<header class="topbar">
  <h1 class="topbar-brand">
    <span class="brand-nini">nini's&nbsp;</span>
    <span class="brand-word">Products</span>
  </h1>
</header>

<main class="page-wrap" id="main-content" style="padding-top:1.25rem">

  <div style="margin-bottom:.75rem">
    <div class="search-wrap" style="margin-bottom:.5rem">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" type="search" id="search-input" placeholder="Search products…" aria-label="Search products" autocomplete="off" oninput="onSearch(this.value)" name="search">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
      <span class="text-muted" style="font-size:13px"><span id="count-label" style="font-weight:500;color:var(--text)" aria-live="polite" aria-atomic="true">…</span> <span id="count-suffix">products</span></span>
      <div style="display:flex;align-items:center;gap:.5rem">
        <div class="sort-bar">
          <span class="sort-bar__label">Sort</span>
          <button class="sort-btn active" id="sort-name-btn" onclick="setSort('name')" aria-pressed="true" type="button">Name <svg class="arrow" viewBox="0 0 10 10"><polyline points="2,3 5,7 8,3"/></svg></button>
          <button class="sort-btn" id="sort-margin-btn" onclick="setSort('margin')" aria-pressed="false" type="button">Margin <svg class="arrow" viewBox="0 0 10 10"><polyline points="2,3 5,7 8,3"/></svg></button>
          <button class="sort-btn" id="sort-date-btn" onclick="setSort('date')" aria-pressed="false" type="button">Newest <svg class="arrow" viewBox="0 0 10 10"><polyline points="2,3 5,7 8,3"/></svg></button>
        </div>
        <div class="view-toggle" role="group" aria-label="View mode">
          <button class="view-btn active" id="view-grid-btn" onclick="setView('grid')" aria-label="Grid view" aria-pressed="true" type="button">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </button>
          <button class="view-btn" id="view-list-btn" onclick="setView('list')" aria-label="List view" aria-pressed="false" type="button">
            <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="product-grid" id="product-grid" aria-label="Product catalogue"></div>
</main>

<!-- Bottom nav -->
<nav class="bottom-nav" aria-label="Main navigation">
  <a href="products.html" class="nav-item active" aria-current="page">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Products
  </a>
  <a href="new.html" class="nav-item fab" onclick="goNew(event)" aria-label="Add new product">
    <div class="fab-circle">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    <span>New</span>
  </a>
  <a href="settings.html" class="nav-item" aria-label="Settings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Settings
  </a>
</nav>

<script>
(function(){const SK='ninis_studio_auth',HP='7cf65358';if(sessionStorage.getItem(SK)!=='granted_'+HP)window.location.replace('login.html');})();

const SUPA_URL='https://dxvzjgzqxltphakyrzmn.supabase.co';
const SUPA_KEY='sb_publishable_MqkXWynuaIialGbCFD7_hw_cEgsenMz';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);

let sortKey='name',sortDir='asc',isSortingMargin=false,allProducts=[],searchQuery='';
let viewMode=localStorage.getItem('lps_view')||'grid';

function setView(mode){
  viewMode=mode;
  try{localStorage.setItem('lps_view',mode);}catch(e){}
  document.getElementById('view-grid-btn').classList.toggle('active',mode==='grid');
  document.getElementById('view-list-btn').classList.toggle('active',mode==='list');
  document.getElementById('view-grid-btn').setAttribute('aria-pressed',mode==='grid'?'true':'false');
  document.getElementById('view-list-btn').setAttribute('aria-pressed',mode==='list'?'true':'false');
  render(allProducts);
}

function marginMeta(m){
  if(m<44)return{cls:'badge--danger',label:'High risk'};
  if(m<50)return{cls:'badge--warn',label:'Caution'};
  if(m<67)return{cls:'badge--ok',label:'Good'};
  return{cls:'badge--info',label:'Premium'};
}
// ─── European number format ───────────────────────────────────────────────────
function fmtEU(n, dec=2){
  if(n==null||isNaN(n)) return '—';
  return Number(n).toFixed(dec)
    .replace('.', ',')
    .replace(/\B(?=(\d{3})+(?!,))/g, '\u202f');
}
function fmtCur(n){ return n==null?'—':'€\u202f'+fmtEU(n,2); }
function fmt(n){ return fmtCur(n); }
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let toastT;
function showToast(state,text){
  const el=document.getElementById('toast'),tx=document.getElementById('toast-txt');
  clearTimeout(toastT);el.className='toast show '+state;tx.textContent=text;
  const delay=state==='err'?4000:2500;
  toastT=setTimeout(()=>el.classList.remove('show'),delay);
}
function closeToast(){
  clearTimeout(toastT);
  document.getElementById('toast').classList.remove('show');
}

function setSort(key){
  if(sortKey===key)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortKey=key;sortDir=key==='margin'?'desc':'asc';}
  isSortingMargin=(key==='margin');
  updateSortBtns();render(allProducts);
}
function updateSortBtns(){
  ['name','margin','date'].forEach(k=>{
    const b=document.getElementById('sort-'+k+'-btn');
    b.classList.toggle('active',sortKey===k);
    b.classList.toggle('asc',sortKey===k&&sortDir==='asc');
    b.classList.toggle('desc',sortKey===k&&sortDir==='desc');
    b.setAttribute('aria-pressed', sortKey===k ? 'true' : 'false');
  });
}
function sortedProducts(list){
  return [...list].sort((a,b)=>{
    const ad=a.data||{},bd=b.data||{};
    let c=0;
    if(sortKey==='name')c=(a.name||'').localeCompare(b.name||'');
    else if(sortKey==='margin')c=(ad.displayMargin||0)-(bd.displayMargin||0);
    else if(sortKey==='date')c=(ad.savedAt||0)-(bd.savedAt||0);
    return sortDir==='asc'?c:-c;
  });
}

function onSearch(q){
  searchQuery=q.trim().toLowerCase();
  render(allProducts);
}
function filteredProducts(products){
  if(!searchQuery)return products;
  return products.filter(r=>(r.name||'').toLowerCase().includes(searchQuery)||(r.data?.matName||'').toLowerCase().includes(searchQuery));
}
function emptyState(container, spanAll){
  const empty=document.createElement('div');
  if(spanAll) empty.style.cssText='grid-column:1/-1;text-align:center;padding:3rem 1rem;color:var(--text-3);font-size:13px';
  else empty.style.cssText='text-align:center;padding:3rem 1rem;color:var(--text-3);font-size:13px';
  if(searchQuery){
    empty.innerHTML=`<svg viewBox="0 0 24 24" style="width:32px;height:32px;stroke:var(--border2);fill:none;stroke-width:1.5;stroke-linecap:round;margin:0 auto .75rem"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>No products match "<strong style="color:var(--text-2)">${esc(searchQuery)}</strong>"`;
  } else {
    empty.innerHTML='<svg viewBox="0 0 24 24" style="width:32px;height:32px;stroke:var(--border2);fill:none;stroke-width:1.5;stroke-linecap:round;margin:0 auto .75rem"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>No products yet<br><span style="font-size:11px">Tap + to add your first one</span>';
  }
  container.appendChild(empty);
}

function deleteConfirmHTML(row){
  return `<div class="delete-confirm" id="del-confirm-${row.id}" data-id="${row.id}">
    <span>Remove "${esc(row.name||'this product')}"?</span>
    <div class="delete-confirm__btns">
      <button class="delete-confirm__btn delete-confirm__btn--no" onclick="cancelDelete(${row.id})" type="button">Cancel</button>
      <button class="delete-confirm__btn delete-confirm__btn--yes" onclick="confirmDelete(${row.id})" type="button">Remove</button>
    </div>
  </div>`;
}

function actionBtns(row){
  return `<button class="icon-btn edit" onclick="editProduct(${row.id})" title="Edit" aria-label="Edit ${esc(row.name||'product')}" type="button">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
  </button>
  <button class="icon-btn del" onclick="deleteProduct(${row.id})" title="Delete" aria-label="Delete ${esc(row.name||'product')}" type="button">
    <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
  </button>`;
}

function render(products){
  allProducts=products;
  const filtered=filteredProducts(products);
  const list=sortedProducts(filtered);
  const container=document.getElementById('product-grid');
  document.getElementById('count-label').textContent=filtered.length;
  document.getElementById('count-suffix').textContent=searchQuery?`of ${products.length} products`:'products';

  // Sync toggle button state on initial load
  document.getElementById('view-grid-btn').classList.toggle('active',viewMode==='grid');
  document.getElementById('view-list-btn').classList.toggle('active',viewMode==='list');

  if(viewMode==='list'){
    container.className='product-list';
    container.setAttribute('aria-label','Product list');
    container.innerHTML='';
    if(!list.length){ emptyState(container,false); return; }

    list.forEach((row,rank)=>{
      const p=row.data||{};
      const m=p.displayMargin??0;
      const mm=marginMeta(m);
      const hasImg=!!p.image;
      const fairOv=p.fairFinalOverride&&p.fairFinalOverride!==p.fairSugg;
      const etsyOv=p.etsyFinalOverride&&p.etsyFinalOverride!==p.etsySugg;
      const webOv=p.webFinalOverride&&p.webFinalOverride!==p.webSugg;
      function pv(val,ov){return `<span class="product-list__price-val${ov?' override':''}">${fmt(val)}</span>`;}

      const item=document.createElement('div');
      item.className='product-list-item page-in';
      item.style.animationDelay=(rank*.03)+'s';
      item.innerHTML=`
        <div class="product-list__thumb">
          ${hasImg
            ?`<img src="${p.image}" alt="${esc(row.name||'')}" loading="lazy">`
            :`<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`
          }
        </div>
        <div class="product-list__info">
          <div class="product-list__name">${esc(row.name||'Untitled')}</div>
          <div class="product-list__meta">${esc(p.matName||'—')}</div>
          <div class="product-list__prices">
            <div class="product-list__price"><span class="product-list__price-label">Fair</span>${pv(p.fairPrice,fairOv)}</div>
            <div class="product-list__price"><span class="product-list__price-label">Etsy</span>${pv(p.etsyPrice,etsyOv)}</div>
            <div class="product-list__price"><span class="product-list__price-label">Web</span>${pv(p.webPrice,webOv)}</div>
          </div>
        </div>
        <div class="product-list__right">
          <span class="badge ${mm.cls}">${Math.round(m)}%</span>
          <div class="product-list__actions">${actionBtns(row)}</div>
        </div>
        ${deleteConfirmHTML(row)}`;
      container.appendChild(item);
    });

  } else {
    container.className='product-grid'+(isSortingMargin?' sorting-margin':'');
    container.setAttribute('aria-label','Product catalogue');
    container.innerHTML='';
    if(!list.length){ emptyState(container,true); return; }

    list.forEach((row,rank)=>{
      const p=row.data||{};
      const m=p.displayMargin??0;
      const mm=marginMeta(m);
      const hasImg=!!p.image;
      const fairOv=p.fairFinalOverride&&p.fairFinalOverride!==p.fairSugg;
      const etsyOv=p.etsyFinalOverride&&p.etsyFinalOverride!==p.etsySugg;
      const webOv=p.webFinalOverride&&p.webFinalOverride!==p.webSugg;
      function pc(val,ov){return ov?`<span class="product-card__price-override">${fmt(val)}</span>`:fmt(val);}

      const card=document.createElement('div');
      card.className='product-card page-in';
      card.style.animationDelay=(rank*.04)+'s';
      card.innerHTML=`
        <div class="rank-badge">#${rank+1}</div>
        ${hasImg
          ?`<img class="product-card__img" src="${p.image}" alt="${esc(row.name||'')}" loading="lazy">`
          :`<div class="product-card__no-img"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>No photo</span></div>`
        }
        <div class="product-card__body">
          <div class="product-card__name">${esc(row.name||'Untitled')}</div>
          <div class="product-card__mat">${esc(p.matName||'—')}</div>
          <div class="product-card__price-row"><span>Fair</span><span>${pc(p.fairPrice,fairOv)}</span></div>
          <div class="product-card__price-row"><span>Etsy</span><span>${pc(p.etsyPrice,etsyOv)}</span></div>
          <div class="product-card__price-row"><span>Web</span><span>${pc(p.webPrice,webOv)}</span></div>
          <div class="product-card__footer">
            <span class="badge ${mm.cls}">${Math.round(m)}% — ${mm.label}</span>
            <div class="product-card__actions">${actionBtns(row)}</div>
          </div>
        </div>
        ${deleteConfirmHTML(row)}`;
      container.appendChild(card);
    });
  }
}

function goNew(e){e.preventDefault();try{localStorage.setItem('lps_edit_id','new');}catch(e){}window.location.href='new.html';}
function editProduct(id){try{localStorage.setItem('lps_edit_id',String(id));}catch(e){}window.location.href='new.html';}
function deleteProduct(id){
  document.querySelectorAll('.delete-confirm.show').forEach(el=>{
    if(el.dataset.id!=id)el.classList.remove('show');
  });
  const conf=document.getElementById('del-confirm-'+id);
  if(!conf)return;
  const wasShown=conf.classList.contains('show');
  conf.classList.toggle('show');
  if(!wasShown){
    // Move focus to Cancel so keyboard users can easily dismiss
    const cancel=conf.querySelector('.delete-confirm__btn--no');
    if(cancel)cancel.focus();
  }
}
async function confirmDelete(id){
  showToast('saving','Removing…');
  await db.from('products').delete().eq('id',id);
  showToast('saved','Removed');
  allProducts=allProducts.filter(p=>p.id!==id);render(allProducts);
}
function cancelDelete(id){
  const conf=document.getElementById('del-confirm-'+id);
  if(conf)conf.classList.remove('show');
}

async function init(){
  const overlay=document.getElementById('overlay');
  try{
    const{data,error}=await db.from('products').select('id,name,data,updated_at').order('updated_at',{ascending:false});
    if(error)throw error;
    render(data||[]);
  }catch(e){
    document.getElementById('count-label').textContent='Error';
    showToast('err','Could not load products');
  }finally{
    overlay.classList.add('hidden');
    setTimeout(()=>overlay.style.display='none',400);
  }
}
// Close any open delete confirmation on Escape
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.delete-confirm.show').forEach(el=>el.classList.remove('show'));
  }
});

updateSortBtns();
setView(viewMode);
init();
</script>
</body>
</html>
